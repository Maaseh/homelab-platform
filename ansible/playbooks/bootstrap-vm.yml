# ==============================================================
# Version: v0.1
#
# Author: Thomas "Maaseh" Bonnet
#
# Description:
# Provisions a new VM cloned from a Proxmox template.
# Play 1 connects to the default template IP, sets the hostname,
# changes the IP address, and registers the new host dynamically.
# Play 2 connects to the new IP and finalizes the installation.
#
# Required arguments:
#   target_ip   - Final IP address for the VM
#   target_name - Final hostname for the VM
#
# Run: ansible-playbook playbooks/bootstrap-vm.yml \
#        -i inventory/staging \
#        -e "target_ip=172.16.10.x target_name=hl-xxxx-xx"
# ==============================================================

---

- name: Play 1 - Initial configuration on template IP
  hosts: staging_vm
  gather_facts: false

  roles:
    - bootstrap

  post_tasks:
    - name: Register new host for Play 2
      ansible.builtin.add_host:
        name:         "{{ target_name }}"
        ansible_host: "{{ target_ip }}"
        ansible_user: "{{ vault_template_user }}"
        groups:       newly_provisioned
      changed_when: false

- name: Play 2 - Post-network configuration on final IP
  hosts: newly_provisioned
  gather_facts: true

  roles:
    - common
