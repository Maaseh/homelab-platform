# Description:
# Installs and configures Prometheus and node_exporter on
# hosts in the infra_monitoring group.
# Node exporter is also deployed to all managed hosts.
#
# Run: ansible-playbook playbooks/prometheus-install.yml \
#        -i inventory/production
# ==============================================================

---

- name: Deploy node_exporter to all managed hosts
  hosts: managed
  gather_facts: true

  tasks:
    - name: Include node_exporter tasks
      ansible.builtin.include_tasks: ../files/services/prometheus/node_exporter/tasks.yml

- name: Deploy Prometheus to monitoring hosts
  hosts: infra_monitoring
  gather_facts: true

  tasks:
    - name: Placeholder - add Prometheus installation tasks
      ansible.builtin.debug:
        msg: "Prometheus installation tasks not yet implemented."
