# ==============================================================
# Version: v0.1
#
# Author: Thomas "Maaseh" Bonnet
#
# Description:
# Staging inventory. Contains only staging_vm, which represents
# a freshly cloned template VM at its default IP.
# This host is used exclusively by playbooks/bootstrap-vm.yml.
# Once provisioned, the host is added to the production inventory.
# ==============================================================

---

env_staging:
  hosts:
    staging_vm:
      ansible_host:     172.16.10.250
      ansible_user:     "{{ vault_template_user }}"
      ansible_password: "{{ vault_template_pass }}"
      ansible_become:   true
