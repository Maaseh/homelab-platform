# ==============================================================
# Version: v0.1
#
# Description:
# Production inventory. Hosts are assigned across three axes:
#   - Technical  : os_*, type_*
#   - Functional : infra_*
#   - Environment: env_*
# A host belongs to one group per axis simultaneously.
# ==============================================================

---

# ==============================================================
# AXIS 1 - TECHNICAL
# Controls how Ansible interacts with each host.
# group_vars for these groups define package managers,
# firewall backends, SELinux state, etc.
# ==============================================================

os_rhel:
  hosts:
    hl-orch-01:
    hl-vpn-01:
    hl-dns-01:
    hl-mon-01:

os_debian:
  hosts:
    # placeholder for future debian hosts

type_vm:
  hosts:
    hl-orch-01:
    hl-vpn-01:
    hl-dns-01:
    hl-mon-01:

type_baremetal:
  hosts:
    pve1:
    pve2:

type_lxc:
  hosts:
    hl-dns-01:

# ==============================================================
# AXIS 2 - FUNCTIONAL
# Defines what the machine does.
# ansible_host is set here and only here.
# ==============================================================

infra_hypervisors:
  hosts:
    pve1:
      ansible_host: 172.16.10.10
    pve2:
      ansible_host: 172.16.10.11

infra_orchestration:
  hosts:
    hl-orch-01:
      ansible_host: 172.16.10.30

infra_networking:
  hosts:
    hl-vpn-01:
      ansible_host: 172.16.10.3
    hl-dns-01:
      ansible_host: 172.16.10.2

infra_monitoring:
  hosts:
    hl-mon-01:
      ansible_host: 172.16.10.5

# ==============================================================
# AXIS 3 - ENVIRONMENT
# Used to scope playbook runs.
# env_production aggregates all production functional groups.
# ==============================================================

env_production:
  children:
    infra_hypervisors:
    infra_orchestration:
    infra_networking:
    infra_monitoring:

# ==============================================================
# CONVENIENCE GROUP
# Target all managed hosts without specifying an environment.
# ==============================================================

managed:
  children:
    env_production:
