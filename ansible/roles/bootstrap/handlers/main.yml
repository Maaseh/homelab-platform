# ==============================================================
# Version: v0.2
#
# Author: Thomas "Maaseh" Bonnet
#
# Description:
# Handlers for the bootstrap role.
#
# Reload sshd           : triggered when SSH config changes.
# Reload network connection : triggered after nmcli change.
#                         ignore_errors is intentional — the connection
#                         drops when the IP changes, which causes nmcli
#                         to return a non-zero exit code remotely.
# ==============================================================

---

- name: Reload sshd
  ansible.builtin.systemd:
    name:  sshd
    state: reloaded

- name: Reload network connection
  community.general.nmcli:
    conn_name: "{{ bootstrap_interface }}"
    state:     present
  ignore_errors: true
