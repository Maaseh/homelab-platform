# ==============================================================
# Version: v0.2
#
# Author: Thomas "Maaseh" Bonnet
#
# Description:
# Sets the system hostname via hostnamectl (systemd).
# Change is immediate — no reboot required.
# Updates /etc/hosts to reflect the new hostname.
# ==============================================================

---

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ target_name }}"
    use:  systemd

- name: Update /etc/hosts with new hostname
  ansible.builtin.lineinfile:
    path:   /etc/hosts
    regexp: "^127\\.0\\.1\\.1"
    line:   "127.0.1.1  {{ target_name }}.{{ internal_domain }}  {{ target_name }}"
    state:  present

