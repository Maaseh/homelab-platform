# ==============================================================
# Version: v0.2
#
# Author: Thomas "Maaseh" Bonnet
#
# Description:
# Baseline configuration applied to every managed host.
# OS-specific behavior is driven entirely by variables
# from group_vars/os_* — no ansible_facts OS checks here.
#
# Sub-task files:
#   timezone.yml  : system timezone
#   ntp.yml       : chrony install and configuration
#   packages.yml  : package cache update and base packages
# ==============================================================

---

- name: Configure timezone
  ansible.builtin.import_tasks: timezone.yml

- name: Configure NTP
  ansible.builtin.import_tasks: ntp.yml

- name: Install base packages
  ansible.builtin.import_tasks: packages.yml
